name: Build PingTest

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            name: pingTest-windows-x86_64.exe
            packages: gcc-mingw-w64-x86-64 mingw-w64-tools binutils-mingw-w64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          REF="${REF#refs/heads/}"
          echo "VERSION=${REF}" >> $GITHUB_ENV
          echo "BUILD_NAME=pingTest-${REF}" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.packages != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.packages }}

      - name: Install Tauri CLI
        run: |
          cargo install tauri-cli --version "^2"

      - name: Build Tauri (no bundle)
        run: |
          echo "=== CWD ==="
          pwd
          ls -la
          echo "=== Target dir ==="
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            export WINDRES=x86_64-w64-mingw32-windres
          fi
          cargo tauri build --target ${{ matrix.target }} --no-bundle
          echo "=== Build output ==="
          find . -name "pingTest.exe" 2>/dev/null | head -10
          echo "=== Done ==="

      - name: Package .exe
        run: |
          mkdir -p dist
          echo "=== Package CWD ==="
          pwd
          echo "=== Finding exe ==="
          EXE_PATH=$(find . -name "pingTest.exe" 2>/dev/null | head -1)
          if [ -n "$EXE_PATH" ] && [ -f "$EXE_PATH" ]; then
            cp "$EXE_PATH" "dist/${{ matrix.name }}"
            echo "SUCCESS: copied $EXE_PATH to dist/${{ matrix.name }}"
          else
            echo "ERROR: pingTest.exe not found"
            ls -la
          fi
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: false
