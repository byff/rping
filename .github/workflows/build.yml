name: Build PingTest

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            name: pingTest-windows-x86_64.exe
            packages: gcc-mingw-w64-x86-64 mingw-w64-tools binutils-mingw-w64
            format: exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: pingTest-linux-x86_64
            packages: ""
            format: deb
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: pingTest-linux-aarch64
            packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            format: deb
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          REF="${REF#refs/heads/}"
          echo "VERSION=${REF}" >> $GITHUB_ENV
          echo "BUILD_NAME=pingTest-${REF}" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.packages != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.packages }}

      - name: Install fpm (for .deb)
        if: matrix.format == 'deb'
        run: |
          sudo apt-get install -y -qq ruby ruby-dev rubygems build-essential
          sudo gem install fpm --no-document

      - name: Build ARM in Docker (for glibc compatibility)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          # Build in Ubuntu 20.04 container to get glibc 2.31
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace \
            ubuntu:20.04 \
            sh -c "
              apt-get update && apt-get install -y curl build-essential gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --target aarch64-unknown-linux-gnu
              . ~/.cargo/env
              cargo build --release --target aarch64-unknown-linux-gnu
            "
          ls -la target/aarch64-unknown-linux-gnu/release/pingTest

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: |
          set -e
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            export WINDRES=x86_64-w64-mingw32-windres
          fi
          cargo build --release --target ${{ matrix.target }}
          echo "=== Build done ==="
          ls -la target/${{ matrix.target }}/release/pingTest* 2>/dev/null || true

      - name: Install ImageMagick (for icon generation)
        if: matrix.format == 'deb'
        run: |
          sudo apt-get install -y -qq imagemagick

      - name: Generate multi-size icons
        if: matrix.format == 'deb'
        run: |
          mkdir -p assets/hicolor
          for size in 16 24 32 48 64 128 256 512; do
            dir="assets/hicolor/${size}x${size}/apps"
            mkdir -p "$dir"
            convert assets/rping.png -resize ${size}x${size} "$dir/rping.png"
          done
          echo "=== Generated multi-size icons ==="
          ls -laR assets/hicolor/

      - name: Package .deb
        if: matrix.format == 'deb'
        run: |
          PKG_NAME="pingTest_${VERSION}_${{ matrix.arch }}.deb"
          mkdir -p dist
          # Copy hicolor icons
          ICON_DIR="pkg/usr/share/icons/hicolor"
          cp -r assets/hicolor "$ICON_DIR"
          # Copy .desktop file
          DESKTOP_DIR="pkg/usr/share/applications"
          mkdir -p "$DESKTOP_DIR"
          sed 's|Icon=.*|Icon=/usr/share/icons/hicolor/256x256/apps/rping.png|' assets/rping.desktop > "$DESKTOP_DIR/pingtest.desktop"
          fpm -s dir -t deb \
            -n pingtest \
            -v ${VERSION} \
            -a ${{ matrix.arch }} \
            -p dist/${PKG_NAME} \
            -d "libc6" \
            --description "High-performance multi-target ping tool | Powered by byff" \
            --maintainer "byff" \
            --vendor "byff" \
            --license "MIT" \
            target/${{ matrix.target }}/release/pingTest=/usr/bin/pingTest \
            pkg/usr/share/icons=/usr/share/icons \
            pkg/usr/share/applications=/usr/share/applications
          cp target/${{ matrix.target }}/release/pingTest dist/${{ matrix.name }}

      - name: Package .exe
        if: matrix.format == 'exe'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/pingTest.exe dist/${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: false
