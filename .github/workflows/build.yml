name: Build RPing

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            name: rping-windows-x86_64.exe
            packages: gcc-mingw-w64-x86-64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: rping-linux-x86_64
            packages: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: rping-linux-aarch64
            packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.packages != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.packages }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/rping.exe dist/${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/rping dist/${{ matrix.name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
